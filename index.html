<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #df142c;
            color:aqua
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #774caf;
            color: white;
            padding: 20px;
        }
        h1 {
            margin: 0;
        }
        .content {
            padding: 30px;
        }
        p {
            font-size: 18px;
            color: #333;
            max-width: 600px;
            margin: auto;
        }
    </style>
</head>
<body>
<header>
    <h1>Welcome to My Webpage</h1>
</header>
<div class="content">
    <h2>About This Page</h2>
    <p>
        This is a simple webpage created using HTML and CSS. 
        It contains a title, headings, a paragraph, and basic styling 
        to make the page look clean and readable.
    </p>
</div>
</body>
</html>

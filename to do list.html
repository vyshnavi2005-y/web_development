<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple To Do List</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}
h2{
    text-align:center;
    margin-bottom:20px;
}
ul{
    list-style:none;
    padding:0;
}
li{
    padding:10px;
    font-size:18px;
}
input[type="checkbox"]{
    margin-right:10px;
}
input[type="checkbox"]:checked + label{
    text-decoration: line-through;
    color: gray;
}
</style>
</head>
<body>
<div class="container">
<h2>My To Do List</h2>
<ul>
<li>
<input type="checkbox" id="task1">
<label for="task1">Complete homework</label>
</li>
<li>
<input type="checkbox" id="task2">
<label for="task2">Study HTML</label>
</li>
<li>
<input type="checkbox" id="task3">
<label for="task3">Practice coding</label>
</li>
<li>
<input type="checkbox" id="task4">
<label for="task4">Exercise</label>
</li>
<li>
    <input type="checkbox" id="task5">
    <label for="task5">listening classes</label>
</li>
<li>
    <input type="checkbox" id="task6">
    <label for="task6">swimming</label>
</li>
<li>
    <input type="checkbox" id="task7">
    <label for="task7">cleaning the room</label>
</li>
</ul>
</div>
</body>
</html>
